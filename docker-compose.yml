version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: portfolio_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: portfolio
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - portfolio_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/portfolio
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRE: 7d
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_TO: ${EMAIL_TO:-sricharu73@gmail.com}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    volumes:
      - ./server/uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - portfolio_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - portfolio_net

volumes:
  mongo_data:

networks:
  portfolio_net:
    driver: bridge
